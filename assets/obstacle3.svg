<!--
  obstacle3.svg — Log  (ground obstacle, type 2)
  Replace with any 70×38 image (PNG, GIF, SVG).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 70 38" width="70" height="38">
  <defs>
    <linearGradient id="bark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#a1887f"/>
      <stop offset="100%" stop-color="#6d4c41"/>
    </linearGradient>
  </defs>

  <!-- shadow -->
  <ellipse cx="35" cy="36" rx="32" ry="4" fill="rgba(0,0,0,0.18)"/>

  <!-- main log body -->
  <rect x="6" y="10" width="58" height="22" rx="11" fill="url(#bark)" stroke="#4e342e" stroke-width="2"/>

  <!-- left end cap -->
  <ellipse cx="6" cy="21" rx="5" ry="11" fill="#bcaaa4" stroke="#4e342e" stroke-width="1.5"/>
  <!-- growth rings on end cap -->
  <ellipse cx="6" cy="21" rx="3.5" ry="7.5" fill="none" stroke="#8d6e63" stroke-width="1"/>
  <ellipse cx="6" cy="21" rx="1.5" ry="3.5" fill="none" stroke="#8d6e63" stroke-width="0.8"/>

  <!-- right end cap -->
  <ellipse cx="64" cy="21" rx="5" ry="11" fill="#bcaaa4" stroke="#4e342e" stroke-width="1.5"/>
  <ellipse cx="64" cy="21" rx="3.5" ry="7.5" fill="none" stroke="#8d6e63" stroke-width="1"/>

  <!-- bark lines -->
  <g stroke="#5d4037" stroke-width="1.2" stroke-linecap="round" fill="none">
    <path d="M 18 11 Q 20 21 18 31"/>
    <path d="M 30 10 Q 32 21 30 32"/>
    <path d="M 42 10 Q 44 21 42 32"/>
    <path d="M 54 11 Q 56 21 54 31"/>
  </g>

  <!-- knot -->
  <ellipse cx="35" cy="22" rx="5" ry="4" fill="#6d4c41" stroke="#4e342e" stroke-width="1.2"/>
  <ellipse cx="35" cy="22" rx="2.5" ry="2" fill="#5d4037"/>
</svg>
