<!--
  obstacle5.svg — Mushroom  (ground obstacle, type 4)
  Replace with any 48×58 image (PNG, GIF, SVG).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 58" width="48" height="58">
  <defs>
    <radialGradient id="cap" cx="38%" cy="30%" r="65%">
      <stop offset="0%"   stop-color="#ef5350"/>
      <stop offset="100%" stop-color="#b71c1c"/>
    </radialGradient>
    <linearGradient id="stem" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#d7ccc8"/>
      <stop offset="50%"  stop-color="#efebe9"/>
      <stop offset="100%" stop-color="#c8b9b5"/>
    </linearGradient>
  </defs>

  <!-- shadow -->
  <ellipse cx="24" cy="56" rx="16" ry="3.5" fill="rgba(0,0,0,0.2)"/>

  <!-- stem -->
  <path d="M 14 56 Q 12 38 16 30 Q 24 26 32 30 Q 36 38 34 56 Z"
        fill="url(#stem)" stroke="#a1887f" stroke-width="1.5"/>
  <!-- stem vertical stripe -->
  <line x1="24" y1="30" x2="24" y2="56" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>
  <!-- stem gills (underside lines) -->
  <g stroke="#a1887f" stroke-width="0.8" stroke-linecap="round">
    <line x1="16" y1="30" x2="14" y2="36"/>
    <line x1="20" y1="28" x2="20" y2="35"/>
    <line x1="24" y1="27" x2="24" y2="34"/>
    <line x1="28" y1="28" x2="28" y2="35"/>
    <line x1="32" y1="30" x2="34" y2="36"/>
  </g>

  <!-- cap (half-ellipse) -->
  <ellipse cx="24" cy="30" rx="23" ry="28" fill="url(#cap)" stroke="#b71c1c" stroke-width="2"
           clip-path="url(#topHalf)"/>
  <clipPath id="topHalf">
    <rect x="0" y="0" width="48" height="30"/>
  </clipPath>

  <!-- cap outline bottom arc -->
  <path d="M 1 30 Q 24 42 47 30" fill="none" stroke="#b71c1c" stroke-width="2"/>

  <!-- white spots -->
  <circle cx="24" cy="13" r="6"   fill="rgba(255,255,255,0.9)"/>
  <circle cx="10" cy="22" r="4.5" fill="rgba(255,255,255,0.85)"/>
  <circle cx="38" cy="21" r="4.5" fill="rgba(255,255,255,0.85)"/>
  <circle cx="16" cy="8"  r="3"   fill="rgba(255,255,255,0.75)"/>
  <circle cx="34" cy="10" r="3"   fill="rgba(255,255,255,0.75)"/>

  <!-- spot shading -->
  <circle cx="24" cy="13" r="3" fill="rgba(200,200,200,0.3)"/>
</svg>
