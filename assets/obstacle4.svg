<!--
  obstacle4.svg — Wooden Fence  (ground obstacle, type 3)
  Replace with any 36×66 image (PNG, GIF, SVG).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 66" width="36" height="66">
  <defs>
    <linearGradient id="wood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#c8a96e"/>
      <stop offset="50%"  stop-color="#e0c080"/>
      <stop offset="100%" stop-color="#b8922e"/>
    </linearGradient>
  </defs>

  <!-- shadow -->
  <ellipse cx="18" cy="64" rx="14" ry="3" fill="rgba(0,0,0,0.2)"/>

  <!-- left post -->
  <rect x="2" y="6" width="10" height="58" rx="3" fill="url(#wood)" stroke="#8b6914" stroke-width="1.5"/>
  <!-- left post pointed top -->
  <polygon points="2,6 7,0 12,6" fill="#d4b062" stroke="#8b6914" stroke-width="1.2"/>
  <!-- left post wood grain -->
  <g stroke="#a87d20" stroke-width="0.8" stroke-linecap="round">
    <line x1="5"  y1="14" x2="5"  y2="58"/>
    <line x1="9"  y1="12" x2="9"  y2="60"/>
    <line x1="7"  y1="20" x2="9"  y2="40"/>
  </g>

  <!-- right post -->
  <rect x="24" y="6" width="10" height="58" rx="3" fill="url(#wood)" stroke="#8b6914" stroke-width="1.5"/>
  <!-- right post pointed top -->
  <polygon points="24,6 29,0 34,6" fill="#d4b062" stroke="#8b6914" stroke-width="1.2"/>
  <g stroke="#a87d20" stroke-width="0.8" stroke-linecap="round">
    <line x1="27" y1="14" x2="27" y2="58"/>
    <line x1="31" y1="12" x2="31" y2="60"/>
  </g>

  <!-- upper horizontal rail -->
  <rect x="1" y="18" width="34" height="9" rx="3" fill="#d4b478" stroke="#8b6914" stroke-width="1.5"/>
  <line x1="1" y1="22" x2="35" y2="22" stroke="#a87d20" stroke-width="0.8"/>

  <!-- lower horizontal rail -->
  <rect x="1" y="40" width="34" height="9" rx="3" fill="#d4b478" stroke="#8b6914" stroke-width="1.5"/>
  <line x1="1" y1="44" x2="35" y2="44" stroke="#a87d20" stroke-width="0.8"/>

  <!-- nail dots -->
  <g fill="#6b4e0e">
    <circle cx="7"  cy="22" r="1.5"/>
    <circle cx="7"  cy="44" r="1.5"/>
    <circle cx="29" cy="22" r="1.5"/>
    <circle cx="29" cy="44" r="1.5"/>
  </g>
</svg>
