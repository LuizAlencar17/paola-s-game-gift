<!--
  obstacle2.svg — Boulder (ground obstacle, type 1)
  Replace with any 56×52 image (PNG, GIF, SVG).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 52" width="56" height="52">
  <defs>
    <radialGradient id="rg" cx="38%" cy="32%" r="58%">
      <stop offset="0%"   stop-color="#bdbdbd"/>
      <stop offset="100%" stop-color="#757575"/>
    </radialGradient>
  </defs>

  <!-- main rock body -->
  <ellipse cx="28" cy="28" rx="26" ry="22" fill="url(#rg)" stroke="#424242" stroke-width="2"/>

  <!-- second smaller rock behind -->
  <ellipse cx="42" cy="33" rx="12" ry="10" fill="#9e9e9e" stroke="#424242" stroke-width="1.5"/>

  <!-- highlight -->
  <ellipse cx="18" cy="18" rx="10" ry="7" fill="rgba(255,255,255,0.22)" transform="rotate(-20,18,18)"/>

  <!-- cracks -->
  <g stroke="#424242" stroke-width="1.5" stroke-linecap="round" fill="none">
    <path d="M 22 12 L 18 26 L 24 34"/>
    <path d="M 30 16 L 34 28"/>
  </g>

  <!-- mossy patches -->
  <ellipse cx="10" cy="38" rx="6"  ry="4"  fill="rgba(76,175,80,0.35)"/>
  <ellipse cx="40" cy="44" rx="8"  ry="3.5" fill="rgba(76,175,80,0.3)"/>
</svg>
