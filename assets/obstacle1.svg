<!--
  obstacle1.svg — Cactus (ground obstacle, type 0)
  Replace with any 44×72 image (PNG, GIF, SVG).
  The game will scale it to match the random size variation.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 72" width="44" height="72">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#3a9e3a"/>
      <stop offset="45%"  stop-color="#56c456"/>
      <stop offset="100%" stop-color="#2e7d2e"/>
    </linearGradient>
  </defs>

  <!-- main trunk -->
  <rect x="16" y="18" width="12" height="54" rx="6" fill="url(#g)" stroke="#276b27" stroke-width="1.5"/>

  <!-- left arm horizontal -->
  <rect x="2"  y="30" width="16" height="9"  rx="4" fill="url(#g)" stroke="#276b27" stroke-width="1.5"/>
  <!-- left arm upturn -->
  <rect x="2"  y="17" width="9"  height="16" rx="4" fill="url(#g)" stroke="#276b27" stroke-width="1.5"/>

  <!-- right arm horizontal -->
  <rect x="26" y="38" width="16" height="9"  rx="4" fill="url(#g)" stroke="#276b27" stroke-width="1.5"/>
  <!-- right arm upturn -->
  <rect x="33" y="24" width="9"  height="17" rx="4" fill="url(#g)" stroke="#276b27" stroke-width="1.5"/>

  <!-- spines -->
  <g stroke="#1b4f1b" stroke-width="1.2" stroke-linecap="round">
    <line x1="22" y1="22" x2="22" y2="17"/>
    <line x1="19" y1="33" x2="15" y2="30"/>
    <line x1="25" y1="33" x2="29" y2="30"/>
    <line x1="19" y1="50" x2="15" y2="47"/>
    <line x1="4"  y1="19" x2="2"  y2="15"/>
    <line x1="9"  y1="18" x2="9"  y2="14"/>
    <line x1="35" y1="26" x2="33" y2="22"/>
    <line x1="40" y1="26" x2="42" y2="22"/>
  </g>

  <!-- centre highlight -->
  <rect x="20" y="22" width="4" height="46" rx="2" fill="rgba(255,255,255,0.12)"/>
</svg>
